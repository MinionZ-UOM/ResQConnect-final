version: "3.9"

services:
  api:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE in .deploy.env}
    pull_policy: always
    container_name: resq_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./.env.production
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/firebase_cred.json
    volumes:
      - ./app/secrets/firebase_cred.json:/app/secrets/firebase_cred.json:ro
    depends_on:
      - redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE in .deploy.env}
    pull_policy: always
    container_name: resq_worker
    command: celery -A app.celery_config.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - ./.env.production
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/firebase_cred.json
    volumes:
      - ./app/secrets/firebase_cred.json:/app/secrets/firebase_cred.json:ro
    depends_on:
      - redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  redis:
    image: redis:7-alpine
    container_name: resq_redis
    command: sh -c 'redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"'
    env_file:
      - ./.env.production
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:

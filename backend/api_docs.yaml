components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Action:
      title: Action
      description: ''
      enum:
      - request_extraction
      - task_creation
      - task_allocation
      - other
      type: string
    AvailabilityUpdate-Input:
      title: AvailabilityUpdate
      type: object
      properties:
        availability:
          title: Availability
          type: boolean
        location:
          $ref: '#/components/schemas/Coordinates-Base'
    AvailabilityUpdate-Output:
      title: AvailabilityUpdate
      type: object
      properties:
        availability:
          title: Availability
          type: boolean
    ChatInput:
      title: ChatInput
      required:
      - user
      - prompt
      - chat_history
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User_chatbot'
        prompt:
          title: Prompt
          type: string
        chat_history:
          title: Chat History
          type: array
          items: {}
    ChatMessageCreate:
      title: ChatMessageCreate
      type: object
      properties:
        text:
          title: Text
          type: string
      required:
      - text
    ChatMessageResponse:
      title: ChatMessageResponse
      required:
      - id
      - sender_id
      - text
      - created_at
      type: object
      properties:
        id:
          title: Id
          type: string
        sender_id:
          title: Sender Id
          type: string
        text:
          title: Text
          type: string
        created_at:
          title: Created At
          type: string
          format: date-time
    Coordinates-Base:
      title: Coordinates
      type: object
      properties:
        lat:
          title: Lat
          type: number
          minimum: -90
          maximum: 90
        lng:
          title: Lng
          type: number
          minimum: -180
          maximum: 180
      required:
      - lat
      - lng
    Disaster:
      title: Disaster
      required:
      - disaster_id
      - type
      - location
      - description
      type: object
      properties:
        disaster_id:
          title: Disaster Id
          type: string
        type:
          title: Type
          type: string
        location:
          $ref: '#/components/schemas/Location'
        description:
          title: Description
          type: string
    DisasterCreate:
      title: DisasterCreate
      required:
      - name
      - description
      - location
      type: object
      properties:
        name:
          title: Name
          type: string
        description:
          title: Description
          type: string
        location:
          $ref: '#/components/schemas/GeoPoint'
        image_urls:
          title: Image Urls
          type: array
          items:
            type: string
        type:
          title: Type
          type: string
          x-nullable: true
        severity:
          title: Severity
          type: string
          x-nullable: true
        affected_count:
          title: Affected Count
          type: integer
          x-nullable: true
    DisasterResponse:
      title: DisasterResponse
      allOf:
      - $ref: '#/components/schemas/DisasterCreate'
      - type: object
        required:
        - id
        - created_at
        - created_by
        - chat_session_id
        properties:
          id:
            title: Id
            type: string
          created_at:
            title: Created At
            type: string
            format: date-time
          created_by:
            title: Created By
            type: string
          chat_session_id:
            title: Chat Session Id
            type: string
    GeoPoint:
      title: GeoPoint
      required:
      - lat
      - lng
      type: object
      properties:
        lat:
          title: Lat
          type: number
          minimum: -90
          maximum: 90
        lng:
          title: Lng
          type: number
          minimum: -180
          maximum: 180
    JoinedResponse:
      title: JoinedResponse
      required:
      - joined
      type: object
      properties:
        joined:
          title: Joined
          type: boolean
    Location:
      title: Location
      type: object
      properties:
        lat:
          title: Lat
          type: number
          minimum: -90
          maximum: 180
        lng:
          title: Lng
          type: number
          minimum: -180
          maximum: 180
    ObservationCreate:
      title: ObservationCreate
      required:
      - disaster_id
      - title
      - description
      - observation_type
      - urgency
      - address
      - image_urls
      type: object
      properties:
        disaster_id:
          title: Disaster Id
          description: ID of the related disaster event
          type: string
        title:
          title: Title
          type: string
        description:
          title: Description
          type: string
        observation_type:
          title: Observation Type
          type: string
        urgency:
          title: Urgency
          type: string
        latitude:
          title: Latitude
          type: number
          x-nullable: true
        longitude:
          title: Longitude
          type: number
          x-nullable: true
        address:
          title: Address
          type: string
        image_urls:
          title: Image Urls
          type: array
          items:
            type: string
    ObservationResponse:
      title: ObservationResponse
      allOf:
      - $ref: '#/components/schemas/ObservationCreate'
      - type: object
        required:
        - id
        - created_by
        - created_at
        properties:
          id:
            title: Id
            type: string
          created_by:
            title: Created By
            type: string
          created_at:
            title: Created At
            type: string
            format: date-time
    Request:
      title: Request
      required:
      - disaster_id
      - type_of_need
      - location
      - id
      - created_by
      - status
      - created_at
      - updated_at
      type: object
      properties:
        disaster_id:
          title: Disaster Id
          example: disaster_1234
          type: string
        type_of_need:
          title: Type Of Need
          examples:
          - food
          - medical
          - rescue
          - other
          type: string
        description:
          title: Description
          description: Optional detailed description of the request
          type: string
        media:
          title: Media
          description: List of metadata for each uploaded media
          type: array
          items:
            $ref: '#/components/schemas/Media'
        location:
          $ref: '#/components/schemas/Location'
        id:
          title: Id
          type: string
        created_by:
          title: Created By
          type: string
        status:
          title: Status
          default: open
          type: string
        assigned_task_id:
          title: Assigned Task Id
          type: string
        created_at:
          title: Created At
          type: string
          format: date-time
        updated_at:
          title: Updated At
          type: string
          format: date-time
      description: ''
      x-config:
        orm_mode: true
    RequestCreate:
      title: RequestCreate
      allOf:
      - $ref: '#/components/schemas/RequestBase'
    RequestStatusUpdate:
      title: RequestStatusUpdate
      required:
      - status
      type: object
      properties:
        status:
          title: Status
          examples:
          - in_progress
          - fulfilled
          - closed
          type: string
        assigned_task_id:
          title: Assigned Task Id
          type: string
    RequestBase:
      title: RequestBase
      required:
      - disaster_id
      - type_of_need
      - location
      type: object
      properties:
        disaster_id:
          title: Disaster Id
          description: Identifier for the associated disaster event
          example: disaster_1234
          type: string
        type_of_need:
          title: Type Of Need
          examples:
          - food
          - medical
          - rescue
          - other
          type: string
        description:
          title: Description

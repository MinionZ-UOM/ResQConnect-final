openapi: 3.1.0
info:
  title: ResQConnect API
  version: 1.0.0
  description: API documentation for ResQConnect
tags:
- name: Users
  description: User registration, authentication and profile related endpoints.
- name: Requests
  description: Help request management (submitted by affected individuals).
- name: Tasks
  description: Task management (assignments for volunteers/responders).
- name: Resources
  description: Resource inventory management.
- name: Disasters
  description: Disaster event management and participation.
- name: Chat
  description: Realtime chat messages within disaster events.
- name: Observations
  description: Community observations and reports related to disasters.
- name: Agent
  description: Internal AI agent endpoints (for automated workflows).
- name: Chatbot
  description: Internal AI chatbot endpoints.
- name: health
  description: Health check endpoint.
paths:
  "/":
    get:
      tags:
      - health
      summary: Health Check
      description: Returns a simple status to indicate the API is running.
      operationId: root__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              example:
                status: ok
  /users/register:
    post:
      tags:
      - Users
      summary: Register User
      description: Register a new user. Requires a Firebase ID token in the **Authorization** header (Bearer). If the user already exists, their profile is returned; otherwise a new user is created.
      operationId: register_users_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
            example:
              display_name: "John Doe"
              role_id: "volunteer"
        required: true
      responses:
        '200':
          description: Successful Response (User profile)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
      security:
      - BearerAuth: []
  /users/me:
    get:
      tags:
      - Users
      summary: Get Current User
      description: Get the profile of the currently authenticated user.
      operationId: me_users_me_get
      responses:
        '200':
          description: Successful Response (User profile)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
      security:
      - BearerAuth: []
  /users/me/availability:
    get:
      tags:
      - Users
      summary: Get Availability (Volunteer)
      description: Get the current availability status of the logged-in volunteer.
      operationId: get_my_availability_users_me_availability_get
      responses:
        '200':
          description: Successful Response (availability status)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityUpdate-Output"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - insufficient permissions (only volunteers can access)
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
      security:
      - BearerAuth: []
    patch:
      tags:
      - Users
      summary: Set Availability (Volunteer)
      description: Mark the current user (must be a volunteer) as available or not available.
      operationId: set_my_availability_users_me_availability_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilityUpdate-Input"
            example:
              availability: true
        required: true
      responses:
        '200':
          description: Successful Response (updated User profile)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - only volunteers may update availability
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
      security:
      - BearerAuth: []
  /users/me/location:
    patch:
      tags:
      - Users
      summary: Update Location
      description: Update the current user's location. Only affected individuals or first responders can update their location.
      operationId: set_my_location_users_me_location_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Coordinates-Base"
            example:
              lat: 7.0
              lng: 80.0
        required: true
      responses:
        '200':
          description: Successful Response (updated User profile)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - only specific roles may update location
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
      security:
      - BearerAuth: []
  /users/{uid}/display_name:
    get:
      tags:
      - Users
      summary: Get Display Name
      description: Fetch the display name of a user by their UID. **No authentication required.**
      operationId: get_display_name_users__uid__display_name_get
      parameters:
      - name: uid
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful Response (display name)
          content:
            application/json:
              example:
                display_name: "John Doe"
        '404':
          description: Not Found
          content:
            application/json:
              example:
                detail: "User not found"
  /requests:
    get:
      tags:
      - Requests
      summary: List Requests
      description: List all help requests (requires admin or authorized responder privileges).
      operationId: list_requests_requests_get
      responses:
        '200':
          description: Successful Response (list of Request objects)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Request"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
      security:
      - BearerAuth: []
    post:
      tags:
      - Requests
      summary: Create Request
      description: Create a new help request (affected individual users). The request includes details of the need and location.
      operationId: create_request_requests_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestCreate"
            example:
              disaster_id: "disaster_123"
              type_of_need: "medical"
              description: "Need medical aid"
              media: []
              location:
                lat: 1.234
                lng: 5.678
        required: true
      responses:
        '201':
          description: Successful Response (created Request)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Request"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - insufficient permissions (only authenticated affected individuals can create requests)
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
      security:
      - BearerAuth: []
  /requests/me:
    get:
      tags:
      - Requests
      summary: List My Requests
      description: List the help requests created by the current authenticated user.
      operationId: my_requests_requests_me_get
      responses:
        '200':
          description: Successful Response (list of Request objects)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Request"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
      security:
      - BearerAuth: []
  /requests/{req_id}:
    get:
      tags:
      - Requests
      summary: Get Request Details
      description: Get detailed information about a specific help request by its ID. Only the request owner or users with appropriate permissions can view it.
      operationId: read_request_requests__req_id__get
      parameters:
      - name: req_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful Response (Request details)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Request"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - you are not the owner or an authorized user for this request
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
        '404':
          description: Not Found
          content:
            application/json:
              example:
                detail: "Resource not found"
      security:
      - BearerAuth: []
  /requests/{req_id}/status:
    patch:
      tags:
      - Requests
      summary: Update Request Status
      description: Update the status of an existing help request (e.g., mark as in_progress, fulfilled, or closed). Requires appropriate permissions (e.g., responder or admin).
      operationId: update_request_status_requests__req_id__status_patch
      parameters:
      - name: req_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestStatusUpdate"
            example:
              status: "fulfilled"
              assigned_task_id: "task_123"
        required: true
      responses:
        '200':
          description: Successful Response (updated Request)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Request"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - insufficient permissions (only authorized personnel can update request status)
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
        '404':
          description: Not Found
          content:
            application/json:
              example:
                detail: "Resource not found"
      security:
      - BearerAuth: []
  /requests/disaster/{disaster_id}:
    get:
      tags:
      - Requests
      summary: List Requests by Disaster
      description: Get all help requests associated with a specific disaster event.
      operationId: list_requests_by_disaster_requests_disaster__disaster_id__get
      parameters:
      - name: disaster_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful Response (list of Request objects for the disaster)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Request"
        '404':
          description: Not Found
          content:
            application/json:
              example:
                detail: "Resource not found"
      security:
      - BearerAuth: []
  /tasks:
    get:
      tags:
      - Tasks
      summary: List Tasks
      description: List all tasks. Only authorized personnel (e.g., admins or dispatchers) can retrieve all tasks.
      operationId: list_tasks_tasks_get
      responses:
        '200':
          description: Successful Response (list of Task objects)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
      security:
      - BearerAuth: []
    post:
      tags:
      - Tasks
      summary: Create Task
      description: Create a new task (e.g., in response to a help request). Only users with task assignment permissions can create tasks.
      operationId: create_task_tasks_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
            example:
              disaster_id: "disaster_123"
              priority: 2
              instructions: "Rescue trapped people"
              role_required: "volunteer"
              resource_ids: []
        required: true
      responses:
        '201':
          description: Successful Response (created Task)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - insufficient permissions (only authorized users can create tasks)
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
      security:
      - BearerAuth: []
  /tasks/me:
    get:
      tags:
      - Tasks
      summary: List My Tasks
      description: List tasks assigned to the current authenticated user (volunteer or responder).
      operationId: my_tasks_tasks_me_get
      responses:
        '200':
          description: Successful Response (list of Task objects)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
      security:
      - BearerAuth: []
  /tasks/{task_id}:
    get:
      tags:
      - Tasks
      summary: Get Task Details
      description: Get details of a specific task by ID. Only the assigned volunteer or authorized personnel can retrieve the task.
      operationId: read_task_tasks__task_id__get
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful Response (Task details)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - you are not the assignee or an authorized user for this task
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
        '404':
          description: Not Found
          content:
            application/json:
              example:
                detail: "Resource not found"
      security:
      - BearerAuth: []
  /tasks/{task_id}/status:
    patch:
      tags:
      - Tasks
      summary: Update Task Status
      description: Update the status (and optionally ETA) of a task (e.g., mark as on_route, completed, failed). Typically done by the assigned volunteer or system.
      operationId: update_task_status_tasks__task_id__status_patch
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskStatusUpdate"
            example:
              status: "completed"
              eta_minutes: 0
        required: true
      responses:
        '200':
          description: Successful Response (updated Task)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '404':
          description: Not Found
          content:
            application/json:
              example:
                detail: "Resource not found"
      security:
      - BearerAuth: []
  /tasks/{task_id}/authorize:
    patch:
      tags:
      - Tasks
      summary: Authorize Task
      description: Mark a task as authorized (approved). Only users with appropriate permissions (e.g., admins) can authorize tasks.
      operationId: authorize_task_endpoint_tasks__task_id__authorize_patch
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful Response (Task marked as authorized)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - insufficient permissions (admin only)
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
        '404':
          description: Not Found
          content:
            application/json:
              example:
                detail: "Resource not found"
      security:
      - BearerAuth: []
  /tasks/{task_id}/assign:
    patch:
      tags:
      - Tasks
      summary: Assign Task
      description: Assign a task to a volunteer or responder. Only authorized users (e.g., admins or dispatchers) can assign tasks.
      operationId: assign_task_tasks__task_id__assign_patch
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskAssignPayload"
            example:
              assigned_to: "user_123"
        required: true
      responses:
        '200':
          description: Successful Response (assigned Task)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
        '404':
          description: Not Found
          content:
            application/json:
              example:
                detail: "Resource not found"
      security:
      - BearerAuth: []
  /resources:
    get:
      tags:
      - Resources
      summary: List Resources
      description: List all resource inventory items. Requires appropriate permissions (inventory managers or admins).
      operationId: list_resources_resources_get
      responses:
        '200':
          description: Successful Response (list of Resource items)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
      security:
      - BearerAuth: []
    post:
      tags:
      - Resources
      summary: Create Resource
      description: Add a new resource item to the inventory (e.g., by an admin or resource manager).
      operationId: create_resource_resources_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceCreate"
            example:
              category: "FOOD"
              quantity_total: 100
              quantity_available: 100
              location_lat: 7.0
              location_lng: 80.0
              status: "available"
              uid: "user_123"
        required: true
      responses:
        '201':
          description: Successful Response (created Resource)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        '400':
          description: Bad Request - invalid input (e.g., user not found or invalid role)
          content:
            application/json:
              example:
                detail: "User not found"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
      security:
      - BearerAuth: []
  /resources/available:
    get:
      tags:
      - Resources
      summary: List Available Resources
      description: List all resources that are currently marked as available.
      operationId: list_available_resources_resources_available_get
      responses:
        '200':
          description: Successful Response (list of available Resource items)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
      security:
      - BearerAuth: []
  /resources/locations:
    get:
      tags:
      - Resources
      summary: List Resource Locations
      description: Fetch the locations of all resources in the inventory (for map display).
      operationId: get_all_resource_locations_resources_locations_get
      responses:
        '200':
          description: Successful Response (list of resource location entries)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    location:
                      type: object
      security: []  # No authentication required
  /resources/{rid}:
    get:
      tags:
      - Resources
      summary: Get Resource
      description: Retrieve details of a specific resource item by its ID.
      operationId: read_resource_resources__rid__get
      parameters:
      - name: rid
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful Response (Resource details)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
        '404':
          description: Not Found
          content:
            application/json:
              example:
                detail: "Resource not found"
      security:
      - BearerAuth: []
    patch:
      tags:
      - Resources
      summary: Update Resource
      description: Update the properties of an existing resource (e.g., mark usage of some quantity). Only authorized users can update resources.
      operationId: update_resource_resources__rid__patch
      parameters:
      - name: rid
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceUpdate"
            example:
              quantity_used: 5
        required: true
      responses:
        '200':
          description: Successful Response (updated Resource)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - insufficient permissions or invalid role for resource
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
        '404':
          description: Not Found
          content:
            application/json:
              example:
                detail: "Resource not found"
      security:
      - BearerAuth: []
    delete:
      tags:
      - Resources
      summary: Delete Resource
      description: Delete a resource item from the inventory. Only admins or resource managers can delete resources.
      operationId: delete_resource_resources__rid__delete
      parameters:
      - name: rid
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful Response (deletion confirmation)
          content:
            application/json:
              example:
                detail: "Resource deleted successfully"
        '404':
          description: Not Found (resource does not exist)
          content:
            application/json:
              example:
                detail: "Resource not found"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:
                detail: "Auth token missing or invalid"
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              example:
                detail: "Not authorized to perform this action"
      security:
      - BearerAuth: []
  /resources/{rid}/status:
    put:
      tags:
      - Resources
      summary: Change Resource Status
      description: Change the availability status of a resource (e.g., mark as not_available or available).
      operationId: change_resource_status_resources__rid__status_put
      parameters:
      - name: rid
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusChangePayload"
            example:
              status: "not_available"
        required: true
      responses:
        '200':
          description: Successful Response (updated Resource)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        '404':
          description: Not Found
          content:
            application/json:
              example:
                detail: "Resource not found"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              example:

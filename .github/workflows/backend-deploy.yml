name: Backend Deploy (ECR -> Server)

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-production-deploy
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      ecr_registry: ${{ steps.ecr-login.outputs.registry }}
      image_uri: ${{ steps.image-meta.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables
        run: |
          test -n "${{ vars.AWS_REGION }}"
          test -n "${{ vars.ECR_REPOSITORY }}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${{ vars.ECR_REPOSITORY }}" >/dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name "${{ vars.ECR_REPOSITORY }}" \
            --image-scanning-configuration scanOnPush=true >/dev/null

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image metadata
        id: image-meta
        run: |
          echo "image_uri=${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy settings
        run: |
          test -n "${{ vars.AWS_REGION }}"
          test -n "${{ vars.DEPLOY_PATH }}"
          test -n "${{ secrets.DEPLOY_HOST }}"
          test -n "${{ secrets.DEPLOY_USER }}"
          test -n "${{ secrets.DEPLOY_SSH_KEY }}"
          test -n "${{ secrets.APP_ENV_B64 }}"
          test -n "${{ secrets.FIREBASE_CRED_B64 }}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Generate short-lived ECR auth token
        id: ecr-token
        run: |
          token="$(aws ecr get-login-password --region "${{ vars.AWS_REGION }}")"
          echo "::add-mask::${token}"
          echo "token=${token}" >> "$GITHUB_OUTPUT"

      - name: Ensure remote deploy path exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            if mkdir -p "${{ vars.DEPLOY_PATH }}" 2>/dev/null; then
              exit 0
            fi
            sudo mkdir -p "${{ vars.DEPLOY_PATH }}"
            sudo chown "${{ secrets.DEPLOY_USER }}":"${{ secrets.DEPLOY_USER }}" "${{ vars.DEPLOY_PATH }}"

      - name: Copy deploy artifacts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "backend/docker-compose.prod.yml,backend/deploy/remote_deploy.sh"
          target: ${{ vars.DEPLOY_PATH }}
          strip_components: 2
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          BACKEND_IMAGE: ${{ needs.build-and-push.outputs.image_uri }}
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr_registry }}
          ECR_PASSWORD: ${{ steps.ecr-token.outputs.token }}
          APP_ENV_B64: ${{ secrets.APP_ENV_B64 }}
          FIREBASE_CRED_B64: ${{ secrets.FIREBASE_CRED_B64 }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH,BACKEND_IMAGE,ECR_REGISTRY,ECR_PASSWORD,APP_ENV_B64,FIREBASE_CRED_B64
          script_stop: true
          command_timeout: 30m
          script: |
            chmod +x "${DEPLOY_PATH}/remote_deploy.sh"
            "${DEPLOY_PATH}/remote_deploy.sh"
